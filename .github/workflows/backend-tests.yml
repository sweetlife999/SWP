name: Backend tests

on:
  push:
    branches: ["**"]
    paths: ["backend/**", "database/migrations/**", ".github/workflows/backend-tests.yml"]
  pull_request:
    branches: [main]
    paths: ["backend/**", "database/migrations/**", ".github/workflows/backend-tests.yml"]

jobs:
  test:
    name: Pytest + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: su
          POSTGRES_PASSWORD: su
          POSTGRES_DB: su_portal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U su -d su_portal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # conftest.py uses setdefault, so these CI values take precedence.
      DATABASE_URL: postgresql://su:su@localhost:5432/su_portal
      ADMIN_PASSWORD: ci-admin-pw
      JWT_SECRET: ci-secret-not-for-production-0123456789
      DEBUG: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Apply database migrations
        run: |
          for f in $(ls ../database/migrations/*.sql | sort); do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run tests with coverage
        # Full suite including @pytest.mark.integration (DB is available here).
        run: pytest --cov=app --cov-report=term-missing

  audit:
    name: pip-audit (dependency vulnerability scan)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pip-audit

      # Additional QA check (Assignment 4): scan runtime dependencies for known CVEs.
      - name: Audit dependencies
        run: pip-audit -r requirements.txt --strict
