name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'database/**'
      - 'compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  FRONTEND_IMAGE: ghcr.io/sweetlife999/swp-frontend
  BACKEND_IMAGE: ghcr.io/sweetlife999/swp-backend
  DB_IMAGE: ghcr.io/sweetlife999/swp-db

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push db
        uses: docker/build-push-action@v6
        with:
          context: ./database
          push: true
          tags: ${{ env.DB_IMAGE }}:latest

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_deploy
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy compose file
        run: |
          scp -i ~/.ssh/id_deploy compose.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/swp/compose.yml

      - name: Write backend .env
        run: |
          ssh -i ~/.ssh/id_deploy \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'mkdir -p /opt/swp/backend'
          echo "${{ secrets.BACKEND_ENV }}" | ssh -i ~/.ssh/id_deploy \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'cat > /opt/swp/backend/.env'

      - name: Pull and restart
        run: |
          ssh -i ~/.ssh/id_deploy \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'cd /opt/swp && docker compose pull && docker compose up -d'
