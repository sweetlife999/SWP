name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least-privilege token plus the permissions the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml graphviz

      - name: Render PlantUML diagrams (.puml -> .svg)
        run: |
          shopt -s globstar nullglob
          files=(docs/**/*.puml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .puml files found under docs/; skipping render."
          else
            echo "Rendering ${#files[@]} diagram(s):"
            printf '  %s\n' "${files[@]}"
            # Outputs an .svg next to each source so Markdown can embed a relative path.
            plantuml -tsvg "${files[@]}"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs
        run: pip install -r requirements-docs.txt

      - name: Build site
        run: mkdocs build --verbose

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
