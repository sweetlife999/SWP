name: Link Check

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/link-check.yml'
  pull_request:
    paths:
      - '**/*.md'
  schedule:
    # weekly on Monday 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lychee:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --exclude '^https?://localhost'
            --exclude '^https?://127\.'
            --exclude 'figma\.com'
            --exclude 'moodle\.'
            --exclude 'github\.com/users/[^/]+/projects'
            --exclude 'github\.com/[^/]+/[^/]+/compare/'
            --exclude 'github\.com/[^/]+/[^/]+/releases/tag/'
            --timeout 20
            --max-retries 3
            --accept 200,206,429
            './**/*.md'
          fail: true
          format: markdown
          output: lychee-report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee-report.md
          retention-days: 7
