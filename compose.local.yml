# Local build override — verifies the stack from source instead of GHCR images.
# Usage: 
# docker compose -f compose.yml -f compose.local.yml up -d --build
# Not used by deploy (deploy.yml copies only compose.yml to the VPS).
services:
  frontend:
    build: ./frontend
    image: swp-frontend-local

  backend:
    build: ./backend
    image: swp-backend-local
    # Known local-test values (override the real backend/.env for a clean dev DB).
    # su_app is the least-privilege DML-only role created by
    # migrations/0010_app_role.sql — not the schema-owning su role.
    environment:
      DATABASE_URL: postgresql://su_app:su_app_dev_password@db:5432/su_portal
      ADMIN_PASSWORD: local-admin-pw
      JWT_SECRET: local-test-secret-not-for-production
      DEBUG: "true"

  db:
    build: ./database
    image: swp-db-local

  # Same locally-built db image (it bundles the migrations + runner).
  migrate:
    build: ./database
    image: swp-db-local
