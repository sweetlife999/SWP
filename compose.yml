services:
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8000"
    environment:
      DATABASE_URL: postgresql://su:su_dev_password@db:5432/su_portal
      ADMIN_PASSWORD: change-this-to-a-strong-password
      JWT_SECRET: dev-secret-change-in-production
      TOKEN_EXPIRE_HOURS: "168"
      CORS_ORIGINS: http://localhost:3000
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: su_portal
      POSTGRES_USER: su
      POSTGRES_PASSWORD: su_dev_password
    ports:
      - "127.0.0.1:6767:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U su -d su_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
