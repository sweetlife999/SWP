# Local development database for the SU Portal.
#
#   cd database && cp .env.example .env && docker compose up -d
#
# On first start Postgres runs every file in /docker-entrypoint-initdb.d once,
# in alphabetical order: the migrations (0001..0003) then the dev seed (zz_*).
# To re-run the init from scratch:  docker compose down -v && docker compose up -d
#
# For PRODUCTION, do NOT mount seeds/ — apply only migrations/ via your
# migration tool or `psql -f`. See README.md.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-su_portal}
      POSTGRES_USER: ${POSTGRES_USER:-su}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-su_dev_password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # The entrypoint runs *.sql directly inside this dir (it does NOT recurse
      # into subfolders) in alphabetical order, so migrations 0001..0003 run
      # before the zz_-prefixed dev seed.
      - ./migrations:/docker-entrypoint-initdb.d:ro
      # dev seed runs last (zz_ prefix). Remove this line for production.
      - ./seeds/dev_seed.sql:/docker-entrypoint-initdb.d/zz_dev_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-su} -d ${POSTGRES_DB:-su_portal}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
