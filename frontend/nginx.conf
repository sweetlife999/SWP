server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service so the stack is self-contained
    # (one origin → no CORS). The variable upstream + Docker DNS resolver lets
    # nginx start even when the backend isn't up yet, instead of failing to boot.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://backend:8000;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
