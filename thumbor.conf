# Thumbor config for the SU Portal image optimizer.
# Serves uploaded images from a shared volume (no external fetching).
# Mounted into the thumbor container; see compose.yml.

LOADER = "thumbor.loaders.file_loader"
FILE_LOADER_ROOT_PATH = "/data/uploads"
STORAGE = "thumbor.storages.no_storage"
RESULT_STORAGE = "thumbor.result_storages.no_storage"

# URLs are not signed (admin-only upload, internal optimizer). Keep behind the
# app's nginx; do not expose thumbor directly to the internet.
ALLOW_UNSAFE_URL = True
